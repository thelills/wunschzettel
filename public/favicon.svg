<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" rx="4" fill="white"/>
  <!-- Rotated square (gift tag shape) -->
  <rect x="6" y="6" width="20" height="20" rx="1.5" fill="none" stroke="#1d1d1f" stroke-width="2" transform="rotate(45 16 16)"/>
  <!-- D in teal -->
  <text x="9" y="20" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#44CCB2">D</text>
  <!-- W in black -->
  <text x="16" y="20" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#1d1d1f">W</text>
</svg>
